<!DOCTYPE html>
<html lang="tr" data-theme="rainbow">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mihra Öğreniyor</title>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="author" content="Mihra Öğreniyor © 2025 - Tüm Hakları Saklıdır">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/*! Mihra Öğreniyor © 2025 - Bu uygulama telif hakları ile korunmaktadır. Kopyalanması, çoğaltılması ve izinsiz kullanılması yasaktır. */
:root{--c1:#FF6B6B;--c2:#4ECDC4;--c3:#FFD93D;--c4:#A8E6CF;--c5:#FF8B94;--c6:#6C5CE7;--bg:#FFF5F0;--bg2:#FFFFFF;--text:#2D3436;--text2:#636E72;--shadow:0 4px 15px rgba(0,0,0,.08);--shadow2:0 8px 30px rgba(0,0,0,.12);--radius:20px;--radius2:16px}
[data-theme="ocean"]{--c1:#0984E3;--c2:#00CEC9;--c3:#74B9FF;--c4:#81ECEC;--c5:#A29BFE;--c6:#6C5CE7;--bg:#E8F4FD;--bg2:#FFFFFF;--text:#2D3436;--text2:#636E72}
[data-theme="forest"]{--c1:#00B894;--c2:#55E6C1;--c3:#F9CA24;--c4:#BADC58;--c5:#6AB04C;--c6:#2C3A47;--bg:#F0FFF4;--bg2:#FFFFFF;--text:#2D3436;--text2:#636E72}
[data-theme="princess"]{--c1:#FD79A8;--c2:#E84393;--c3:#FDCB6E;--c4:#FAB1A0;--c5:#FF7675;--c6:#A29BFE;--bg:#FFF0F6;--bg2:#FFFFFF;--text:#2D3436;--text2:#636E72}
[data-theme="night"]{--c1:#A29BFE;--c2:#74B9FF;--c3:#FFEAA7;--c4:#81ECEC;--c5:#FD79A8;--c6:#6C5CE7;--bg:#1A1A2E;--bg2:#16213E;--text:#FFFFFF;--text2:#B2BEC3}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;width:100vw}
#app-wrapper{width:100%;height:100%;overflow:hidden;position:relative;transform-origin:top center;transition:transform .3s ease}
#app{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;scroll-behavior:smooth}
#app::-webkit-scrollbar{width:6px}
#app::-webkit-scrollbar-thumb{background:var(--c1);border-radius:3px}
.screen{display:none;min-height:100%;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes starPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--c1)}50%{box-shadow:0 0 20px var(--c1),0 0 40px var(--c2)}}

/* SPLASH */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c6));background-size:300% 300%;animation:rainbow 4s ease infinite;position:relative;overflow:hidden}
.splash::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 70%,rgba(255,255,255,.15) 0%,transparent 50%)}
.splash-logo{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:900;color:#FFF;text-shadow:0 4px 20px rgba(0,0,0,.2);animation:bounceIn 1s ease;text-align:center;line-height:1.2}
.splash-sub{font-size:clamp(.9rem,2.5vw,1.3rem);color:rgba(255,255,255,.9);margin-top:10px;animation:fadeInUp 1s ease .3s both}
.splash-emoji{font-size:clamp(3rem,10vw,6rem);animation:float 2s ease-in-out infinite;margin:30px 0}
.splash-btn{margin-top:30px;padding:16px 50px;background:#FFF;color:var(--c1);font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:800;border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,.15);animation:fadeInUp 1s ease .6s both;transition:all .3s ease}
.splash-btn:hover{transform:scale(1.05);box-shadow:0 12px 35px rgba(0,0,0,.2)}
.splash-btn:active{transform:scale(.95)}
.splash-stars{position:absolute;inset:0;pointer-events:none}
.splash-star{position:absolute;color:rgba(255,255,255,.6);animation:starPulse 2s ease infinite}
.splash-ver{position:absolute;bottom:15px;color:rgba(255,255,255,.5);font-size:.75rem}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg2);padding:8px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);border-bottom:3px solid var(--c1)}
.header-title{font-weight:800;font-size:clamp(.85rem,2.5vw,1.1rem);color:var(--c1);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{width:38px;height:38px;border-radius:12px;border:none;background:var(--bg);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.header-btn:hover{background:var(--c1);color:#FFF;transform:scale(1.05)}
.header-btn:active{transform:scale(.9)}
.timer-badge{background:linear-gradient(135deg,var(--c1),var(--c5));color:#FFF;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:4px;flex-shrink:0}
.timer-badge::before{content:'⏱️';font-size:.85rem}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);display:flex;padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));box-shadow:0 -4px 15px rgba(0,0,0,.08);border-top:2px solid rgba(0,0,0,.04);gap:4px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:12px;cursor:pointer;transition:all .2s;gap:2px;border:none;background:transparent;font-family:'Nunito',sans-serif;color:var(--text2)}
.nav-item.active{background:linear-gradient(135deg,var(--c1),var(--c5));color:#FFF;transform:scale(1.02)}
.nav-item:active{transform:scale(.92)}
.nav-icon{font-size:1.3rem;line-height:1}
.nav-label{font-size:.6rem;font-weight:700;line-height:1}

/* HOME */
.home-content{padding:12px;padding-bottom:80px}
.welcome-card{background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:var(--radius);padding:20px;color:#FFF;margin-bottom:16px;position:relative;overflow:hidden}
.welcome-card::after{content:'🌟';position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:3rem;opacity:.3}
.welcome-name{font-size:1.5rem;font-weight:900}
.welcome-msg{font-size:.9rem;opacity:.9;margin-top:4px}
.daily-word{background:var(--bg2);border-radius:var(--radius2);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .2s}
.daily-word:active{transform:scale(.97)}
.daily-emoji{font-size:2.5rem;background:var(--bg);width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.daily-label{font-size:.7rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.daily-name{font-size:1.2rem;font-weight:800;color:var(--c1)}
.daily-cat{font-size:.75rem;color:var(--text2)}
.section-title{font-size:1rem;font-weight:800;color:var(--text);margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.cat-card{background:var(--bg2);border-radius:var(--radius2);padding:14px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);position:relative;overflow:hidden;border:2px solid transparent}
.cat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--c1)}
.cat-card:active{transform:scale(.95)}
.cat-icon{font-size:2.2rem;margin-bottom:6px;display:block}
.cat-name{font-size:.85rem;font-weight:700;color:var(--text)}
.cat-count{font-size:.7rem;color:var(--text2);margin-top:2px}
.cat-progress{height:4px;background:var(--bg);border-radius:2px;margin-top:8px;overflow:hidden}
.cat-progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width .5s ease}
.streak-card{background:linear-gradient(135deg,var(--c3),#FF6348);border-radius:var(--radius2);padding:14px;color:#FFF;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.streak-fire{font-size:2rem}
.streak-num{font-size:1.5rem;font-weight:900}
.streak-label{font-size:.75rem;opacity:.9}

/* CATEGORY VIEW */
.view-controls{display:flex;gap:6px;padding:10px 12px;background:var(--bg2);align-items:center;flex-wrap:wrap}
.view-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--c1);background:transparent;color:var(--c1);font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .2s}
.view-btn.active{background:var(--c1);color:#FFF}
.view-btn:active{transform:scale(.93)}
.speak-all-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--c2);background:var(--c2);color:#FFF;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;margin-left:auto;transition:all .2s}
.speak-all-btn:active{transform:scale(.93)}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;padding:12px;padding-bottom:80px}
.item-card{background:var(--bg2);border-radius:var(--radius2);padding:16px 10px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:6px;border:3px solid transparent;position:relative}
.item-card:hover{border-color:var(--c1);transform:translateY(-2px)}
.item-card:active{transform:scale(.93)}
.item-card.viewed{border-color:var(--c4)}
.item-card.viewed::after{content:'✓';position:absolute;top:6px;right:6px;background:var(--c4);color:#FFF;width:18px;height:18px;border-radius:50%;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:900}
.item-emoji{font-size:3rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.item-name{font-size:.95rem;font-weight:800;color:var(--text)}
.item-speak{font-size:.7rem;color:var(--c1);font-weight:600}
/* Card/Slider View */
.card-view{padding:20px 12px;padding-bottom:80px;display:flex;flex-direction:column;align-items:center}
.card-slider{width:100%;max-width:400px;text-align:center}
.card-single{background:var(--bg2);border-radius:24px;padding:30px 20px;box-shadow:var(--shadow2);text-align:center;animation:popIn .4s ease;border:4px solid var(--c1)}
.card-single .item-emoji{font-size:clamp(5rem,15vw,8rem)}
.card-single .item-name{font-size:clamp(1.5rem,5vw,2.2rem);margin-top:12px}
.card-nav{display:flex;justify-content:center;gap:16px;margin-top:20px;align-items:center}
.card-nav-btn{width:50px;height:50px;border-radius:50%;border:none;background:var(--c1);color:#FFF;font-size:1.3rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.card-nav-btn:active{transform:scale(.85)}
.card-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.card-counter{font-size:.9rem;font-weight:700;color:var(--text2);min-width:60px;text-align:center}
.card-speak-btn{margin-top:16px;padding:12px 30px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--c1),var(--c5));color:#FFF;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow);animation:pulse 2s infinite;display:inline-flex;align-items:center;gap:8px}
.card-speak-btn:active{transform:scale(.93);animation:none}

/* GAMES */
.games-content{padding:12px;padding-bottom:80px}
.game-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.game-card{background:var(--bg2);border-radius:var(--radius2);padding:18px 12px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);border:3px solid transparent}
.game-card:hover{border-color:var(--c1);transform:translateY(-3px)}
.game-card:active{transform:scale(.95)}
.game-icon{font-size:2.5rem;margin-bottom:8px}
.game-name{font-size:.9rem;font-weight:800;color:var(--text)}
.game-desc{font-size:.7rem;color:var(--text2);margin-top:4px}
.game-area{padding:12px;padding-bottom:80px;display:flex;flex-direction:column;align-items:center;gap:16px}
.game-score{background:linear-gradient(135deg,var(--c1),var(--c2));color:#FFF;padding:8px 20px;border-radius:20px;font-weight:800;font-size:1rem;display:flex;align-items:center;gap:8px}
.game-question{font-size:clamp(1.1rem,3.5vw,1.5rem);font-weight:800;text-align:center;color:var(--text);padding:0 10px}
.game-options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:400px}
.game-option{background:var(--bg2);border:3px solid var(--bg);border-radius:var(--radius2);padding:20px 10px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);font-size:3rem}
.game-option:active{transform:scale(.9)}
.game-option.correct{border-color:#00B894;background:#E8FFF5;animation:bounceIn .5s}
.game-option.wrong{border-color:#FF6B6B;background:#FFF5F5;animation:shake .5s}
.game-option.disabled{pointer-events:none;opacity:.6}
.game-result{text-align:center;padding:30px;animation:bounceIn .6s}
.game-result-emoji{font-size:4rem;margin-bottom:12px}
.game-result-text{font-size:1.3rem;font-weight:800;color:var(--text)}
.game-result-score{font-size:1rem;color:var(--text2);margin-top:6px}
.game-result-btn{margin-top:16px;padding:12px 30px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--c1),var(--c2));color:#FFF;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
/* Memory Game */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:400px}
.memory-card{aspect-ratio:1;background:var(--c1);border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .3s;box-shadow:var(--shadow);position:relative}
.memory-card.flipped,.memory-card.matched{background:var(--bg2);border:3px solid var(--c1)}
.memory-card.matched{border-color:var(--c4);opacity:.7}
.memory-card:not(.flipped):not(.matched)::after{content:'❓';font-size:1.5rem}
.memory-card:active{transform:scale(.92)}
/* Color Match */
.color-target{width:80px;height:80px;border-radius:50%;margin:0 auto;box-shadow:var(--shadow2);border:4px solid var(--bg2)}
.color-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:350px}
.color-opt{padding:16px 8px;border-radius:var(--radius2);background:var(--bg2);text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);border:3px solid transparent}
.color-opt:active{transform:scale(.9)}
.color-opt .item-emoji{font-size:2rem}
.color-opt .item-name{font-size:.75rem;font-weight:700;margin-top:4px}

/* STATS */
.stats-content{padding:12px;padding-bottom:80px}
.stat-card{background:var(--bg2);border-radius:var(--radius2);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.stat-title{font-size:.85rem;font-weight:800;color:var(--c1);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.stat-item{text-align:center;padding:10px;background:var(--bg);border-radius:12px}
.stat-num{font-size:1.4rem;font-weight:900;color:var(--c1)}
.stat-label{font-size:.65rem;color:var(--text2);font-weight:600;margin-top:2px}
.chart-container{width:100%;overflow:hidden;border-radius:12px;margin-top:8px}
.chart-container canvas{width:100%;height:180px;display:block}
.stat-list{list-style:none}
.stat-list li{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg);font-size:.85rem}
.stat-list li:last-child{border:none}
.stat-list .rank{font-weight:800;color:var(--c1);margin-right:8px;min-width:20px}
.stat-list .sname{flex:1;font-weight:600}
.stat-list .sval{font-weight:800;color:var(--c2)}
.reset-btn{width:100%;padding:14px;border-radius:var(--radius2);border:2px solid #FF6B6B;background:transparent;color:#FF6B6B;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.reset-btn:hover{background:#FF6B6B;color:#FFF}

/* SETTINGS */
.settings-content{padding:12px;padding-bottom:80px}
.setting-group{background:var(--bg2);border-radius:var(--radius2);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.setting-title{font-size:.85rem;font-weight:800;color:var(--c1);margin-bottom:10px}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.theme-btn{padding:12px 8px;border-radius:12px;border:3px solid var(--bg);text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);font-family:'Nunito',sans-serif}
.theme-btn.active{border-color:var(--c1);box-shadow:var(--shadow)}
.theme-btn:active{transform:scale(.93)}
.theme-icon{font-size:1.5rem}
.theme-name{font-size:.7rem;font-weight:700;margin-top:4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg)}
.setting-row:last-child{border:none}
.setting-label{font-size:.85rem;font-weight:600}
.setting-value{font-size:.85rem;font-weight:700;color:var(--c1)}

/* ZOOM/FULLSCREEN BAR */
.float-controls{position:fixed;top:50%;right:6px;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:4px}
.float-btn{width:32px;height:32px;border-radius:10px;border:none;background:var(--bg2);color:var(--text);font-size:.9rem;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:.6}
.float-btn:hover{opacity:1;background:var(--c1);color:#FFF}
.float-btn:active{transform:scale(.85)}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;z-index:9999;pointer-events:none;animation:confettiFall 3s ease-out forwards}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s}
.modal{background:var(--bg2);border-radius:var(--radius);padding:24px;max-width:380px;width:100%;text-align:center;animation:popIn .4s;box-shadow:var(--shadow2)}
.modal h3{font-size:1.2rem;margin-bottom:8px;color:var(--text)}
.modal p{font-size:.9rem;color:var(--text2);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btn{padding:10px 24px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.modal-btn.primary{background:var(--c1);color:#FFF}
.modal-btn.secondary{background:var(--bg);color:var(--text)}
.modal-btn:active{transform:scale(.93)}

/* ACHIEVEMENTS */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.badge{text-align:center;padding:10px 6px;border-radius:12px;background:var(--bg);transition:all .2s}
.badge.earned{background:linear-gradient(135deg,var(--c3),var(--c1));animation:glow 2s infinite}
.badge-icon{font-size:1.8rem;filter:grayscale(1);opacity:.3}
.badge.earned .badge-icon{filter:none;opacity:1}
.badge-name{font-size:.6rem;font-weight:700;margin-top:4px;color:var(--text2)}
.badge.earned .badge-name{color:#FFF}

/* TOAST */

// ===================== TRACKING =====================
function trackCategoryView(catId){
stats.categoryViews[catId]=(stats.categoryViews[catId]||0)+1;
stats.totalCatViews=(stats.totalCatViews||0)+1;
saveStats();checkAchievements();
}
function trackItemView(name){
stats.itemViews[name]=(stats.itemViews[name]||0)+1;
saveStats();checkAchievements();
}
function trackGamePlayed(gameId,score,total){
stats.gamesPlayed=(stats.gamesPlayed||0)+1;
stats.gameTypes[gameId]=(stats.gameTypes[gameId]||0)+1;
if(!stats.gameScores[gameId])stats.gameScores[gameId]=[];
stats.gameScores[gameId].push({date:new Date().toISOString(),score,total});
if(score===total)stats.perfectGame=true;
saveStats();checkAchievements();
}
function trackTime(){
let now=new Date();
let dateKey=now.toISOString().split('T')[0];
let hour=now.getHours();
stats.dailyUsage[dateKey]=(stats.dailyUsage[dateKey]||0)+1;
stats.hourlyUsage[hour]=(stats.hourlyUsage[hour]||0)+1;
stats.totalTime=(stats.totalTime||0)+1;
// Streak
if(stats.lastDate!==dateKey){
let yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);
let yKey=yesterday.toISOString().split('T')[0];
if(stats.lastDate===yKey){stats.streak=(stats.streak||0)+1;}
else if(stats.lastDate!==dateKey){stats.streak=1;}
stats.lastDate=dateKey;
}
saveStats();
}
function checkAchievements(){
let newBadges=[];
ACHIEVEMENTS.forEach(a=>{
if(!stats.earnedBadges.includes(a.id)&&a.check(stats)){
stats.earnedBadges.push(a.id);
newBadges.push(a);
}
});
if(newBadges.length>0){saveStats();newBadges.forEach(b=>showToast('🏅 Rozet: '+b.name));}
}
function resetAllStats(){
stats={categoryViews:{},itemViews:{},dailyUsage:{},hourlyUsage:{},sessions:[],gameScores:{},gameTypes:{},
totalTime:0,totalCatViews:0,gamesPlayed:0,streak:0,lastDate:'',earnedBadges:[],perfectGame:false};
saveStats();showToast('İstatistikler sıfırlandı');navigate('stats');
}

// ===================== SPEECH =====================
function speak(text){
if(!('speechSynthesis' in window))return;
window.speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang='tr-TR';u.rate=0.8;u.pitch=1.1;u.volume=1;
let voices=speechSynthesis.getVoices();
let trVoice=voices.find(v=>v.lang.startsWith('tr'));
if(trVoice)u.voice=trVoice;
speechSynthesis.speak(u);
}
if('speechSynthesis' in window)speechSynthesis.onvoiceschanged=()=>{};

function playCorrectSound(){
try{let ac=new(window.AudioContext||window.webkitAudioContext)();
let o=ac.createOscillator();let g=ac.createGain();o.connect(g);g.connect(ac.destination);
o.frequency.setValueAtTime(523,ac.currentTime);o.frequency.setValueAtTime(659,ac.currentTime+0.1);
o.frequency.setValueAtTime(784,ac.currentTime+0.2);g.gain.setValueAtTime(0.3,ac.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);o.start();o.stop(ac.currentTime+0.4);}catch(e){}
}
function playWrongSound(){
try{let ac=new(window.AudioContext||window.webkitAudioContext)();
let o=ac.createOscillator();let g=ac.createGain();o.connect(g);g.connect(ac.destination);
o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.setValueAtTime(200,ac.currentTime+0.15);
o.type='square';g.gain.setValueAtTime(0.2,ac.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.3);o.start();o.stop(ac.currentTime+0.3);}catch(e){}
}

function showModal(title,msg,onConfirm,onCancel){
let html=`<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
<div class="modal"><h3>${title}</h3><p>${msg}</p><div class="modal-btns">
${onCancel?'<button class="modal-btn secondary" onclick="this.closest(\'.modal-overlay\').remove()">İptal</button>':''}
<button class="modal-btn primary" id="modalConfirm">Tamam</button></div></div></div>`;
document.body.insertAdjacentHTML('beforeend',html);
document.getElementById('modalConfirm').onclick=()=>{
document.querySelector('.modal-overlay').remove();if(onConfirm)onConfirm();
};
}
function toggleFullscreen(){
if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
else{document.exitFullscreen();}
}
function adjustZoom(d){
state.zoom=Math.max(0.5,Math.min(1.5,state.zoom+d));
document.getElementById('app-wrapper').style.transform='scale('+state.zoom+')';
saveSettings();
}
function resetZoom(){state.zoom=1;document.getElementById('app-wrapper').style.transform='scale(1)';saveSettings();}

function formatTime(sec){
let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
if(h>0)return h+'s '+m+'dk';
return m+'dk '+s+'sn';
}

function getDailyWord(){
let today=new Date().toDateString();
let seed=0;for(let i=0;i<today.length;i++)seed+=today.charCodeAt(i);
let allItems=[];CATEGORIES.forEach(c=>c.items.forEach(it=>allItems.push({...it,cat:c.name,catIcon:c.icon})));
return allItems[seed%allItems.length];
}

// ===================== NAVIGATION =====================
function navigate(screen,params){
state.screen=screen;
if(params){
if(params.catId!==undefined)state.catId=params.catId;
if(params.gameId!==undefined)state.gameId=params.gameId;
if(params.cardIndex!==undefined)state.cardIndex=params.cardIndex;
}
saveSettings();render();
window.scrollTo(0,0);
document.getElementById('app').scrollTop=0;
}

// ===================== RENDER =====================
function render(){
const app=document.getElementById('app');
let html='';
switch(state.screen){
case 'splash':html=renderSplash();break;
case 'home':html=renderHome();break;
case 'category':html=renderCategory();break;
case 'games':html=renderGames();break;
case 'gamePlay':html=renderGamePlay();break;
case 'stats':html=renderStats();break;
case 'settings':html=renderSettings();break;
default:html=renderHome();
}
app.innerHTML=html;
document.getElementById('floatControls').style.display=state.screen==='splash'?'none':'flex';
bindEvents();
}

// FIND GAME
function renderFindGame(){
if(!gameState.active||gameState.type!=='find'){
gameState={type:'find',active:true,score:0,round:0,total:8,answered:false};
}
if(gameState.round>=gameState.total){
return renderGameResult(gameState.score,gameState.total);
}
let allItems=[];CATEGORIES.forEach(c=>c.items.forEach(it=>allItems.push(it)));
let shuffled=shuffleArray([...allItems]);
let correct=shuffled[0];
let options=shuffled.slice(0,4);
options=shuffleArray(options);
gameState.correctAnswer=correct.n;
gameState.options=options;
gameState.answered=false;

setTimeout(()=>speak(correct.n),500);

return `<div class="game-score">⭐ ${gameState.score} / ${gameState.total} &nbsp;|&nbsp; Soru ${gameState.round+1}</div>
<div class="game-question">🔊 "${correct.n}" nerede?</div>
<div class="game-options">${options.map((o,i)=>
`<div class="game-option" onclick="checkFindAnswer(this,${i},'${o.n}')" data-name="${o.n}">${o.e}</div>`
).join('')}</div>`;
}

function checkFindAnswer(el,idx,name){
if(gameState.answered)return;
gameState.answered=true;
let allOpts=document.querySelectorAll('.game-option');
if(name===gameState.correctAnswer){
el.classList.add('correct');
gameState.score++;
playCorrectSound();
showConfetti();
speak('Aferin! '+name);
}else{
el.classList.add('wrong');
playWrongSound();
allOpts.forEach(o=>{if(o.dataset.name===gameState.correctAnswer)o.classList.add('correct');});
speak(gameState.correctAnswer);
}
allOpts.forEach(o=>o.classList.add('disabled'));
setTimeout(()=>{gameState.round++;render();},1800);
}

// MEMORY GAME
function renderMemoryGame(){
if(!gameState.active||gameState.type!=='memory'){
let allItems=[];CATEGORIES.forEach(c=>c.items.forEach(it=>allItems.push(it)));
let picked=shuffleArray([...allItems]).slice(0,6);
let cards=[...picked,...picked].map((it,i)=>({id:i,e:it.e,n:it.n,pairId:picked.indexOf(it)}));
cards=shuffleArray(cards.map((c,i)=>({...c,uid:i})));
gameState={type:'memory',active:true,cards,flipped:[],matched:[],moves:0,pairs:6,foundPairs:0};
}
if(gameState.foundPairs>=gameState.pairs){
return renderGameResult(gameState.pairs,gameState.pairs);
}
return `<div class="game-score">🃏 ${gameState.foundPairs}/${gameState.pairs} eşleşme &nbsp;|&nbsp; ${gameState.moves} hamle</div>
<div class="memory-grid">${gameState.cards.map((c,i)=>{
let isFlipped=gameState.flipped.includes(i);
let isMatched=gameState.matched.includes(c.n);
return `<div class="memory-card${isFlipped?' flipped':''}${isMatched?' matched':''}" onclick="flipCard(${i})">${isFlipped||isMatched?c.e:''}</div>`;
}).join('')}</div>`;
}

function flipCard(idx){
if(gameState.flipped.length>=2)return;
if(gameState.flipped.includes(idx))return;
if(gameState.matched.includes(gameState.cards[idx].n))return;
gameState.flipped.push(idx);
gameState.moves++;
speak(gameState.cards[idx].n);
render();
if(gameState.flipped.length===2){
let c1=gameState.cards[gameState.flipped[0]];
let c2=gameState.cards[gameState.flipped[1]];
if(c1.n===c2.n){
gameState.matched.push(c1.n);
gameState.foundPairs++;
gameState.flipped=[];
playCorrectSound();
if(gameState.foundPairs>=gameState.pairs){
trackGamePlayed('memory',gameState.pairs,gameState.pairs);
showConfetti();
}
setTimeout(()=>render(),400);
}else{
playWrongSound();
setTimeout(()=>{gameState.flipped=[];render();},1000);
}
}
}

{...cat1.items[Math.floor(Math.random()*cat1.items.length)],correctCat:cat1.id,correctName:cat1.name}:
{...cat2.items[Math.floor(Math.random()*cat2.items.length)],correctCat:cat2.id,correctName:cat2.name};
gameState.correctCat=item.correctCat;
gameState.answered=false;
setTimeout(()=>speak(item.n+' hangi kategoride?'),300);

return `<div class="game-score">⭐ ${gameState.score} / ${gameState.total} &nbsp;|&nbsp; Soru ${gameState.round+1}</div>
<div style="font-size:4rem;text-align:center;margin:10px 0">${item.e}</div>
<div class="game-question">"${item.n}" hangi gruba ait?</div>
<div class="game-options" style="grid-template-columns:1fr 1fr">
<div class="game-option" style="font-size:1rem;padding:15px" onclick="checkCatAnswer(this,'${cat1.id}')">
<div style="font-size:2rem">${cat1.icon}</div>${cat1.name}</div>
<div class="game-option" style="font-size:1rem;padding:15px" onclick="checkCatAnswer(this,'${cat2.id}')">
<div style="font-size:2rem">${cat2.icon}</div>${cat2.name}</div>
</div>`;
}

function checkCatAnswer(el,catId){
if(gameState.answered)return;
gameState.answered=true;
if(catId===gameState.correctCat){el.classList.add('correct');gameState.score++;playCorrectSound();speak('Doğru!');}
else{el.classList.add('wrong');playWrongSound();speak('Yanlış!');}
document.querySelectorAll('.game-option').forEach(o=>o.classList.add('disabled'));
setTimeout(()=>{gameState.round++;render();},1500);
}

function renderGameResult(score,total){
let pct=Math.round(score/total*100);
let emoji=pct>=80?'🏆':pct>=50?'⭐':'💪';
let msg=pct>=80?'Harikasın Mihra!':pct>=50?'Çok iyi gidiyorsun!':'Tekrar deneyebilirsin!';
trackGamePlayed(state.gameId,score,total);
if(pct>=80)showConfetti();

return `<div class="game-result">
<div class="game-result-emoji">${emoji}</div>
<div class="game-result-text">${msg}</div>
<div class="game-result-score">${score} / ${total} doğru (${pct}%)</div>
<button class="game-result-btn" onclick="gameState={};render()">🔄 Tekrar Oyna</button>
<button class="game-result-btn" style="background:var(--c2);margin-left:8px" onclick="navigate('games')">🏠 Oyunlar</button>
</div>`;
}

function shuffleArray(arr){
for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
return arr;
}

// Game scores

// Category progress

// Achievements

html+=`</div></div>`;

// Usage calendar (last 14 days)
html+=`<div class="stat-card"><div class="stat-title">📆 Son 14 Gün</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center">`;
let today=new Date();
for(let i=13;i>=0;i--){
let d=new Date(today);d.setDate(d.getDate()-i);
let key=d.toISOString().split('T')[0];
let usage=stats.dailyUsage[key]||0;
let intensity=usage===0?0:Math.min(1,usage/300);
let bg=usage>0?`rgba(78,205,196,${0.2+intensity*0.8})`:'var(--bg)';

html+=`</div>`;
html+=renderNav();

setTimeout(()=>{drawCharts();},100);

}

function drawCharts(){
// Category chart
let catCanvas=document.getElementById('catChart');
if(catCanvas){
let ctx=catCanvas.getContext('2d');
catCanvas.width=catCanvas.parentElement.offsetWidth;
catCanvas.height=180;
let data=CATEGORIES.map(c=>({label:c.icon,value:stats.categoryViews[c.id]||0,color:c.gradient[0]}));
data.sort((a,b)=>b.value-a.value);
data=data.slice(0,10);
let maxVal=Math.max(...data.map(d=>d.value),1);
let barW=(catCanvas.width-40)/data.length;
let isDark=state.theme==='night';
ctx.fillStyle=isDark?'#1A1A2E':'#FFFFFF';ctx.fillRect(0,0,catCanvas.width,catCanvas.height);
data.forEach((d,i)=>{
let h=(d.value/maxVal)*130;
let x=20+i*barW;
ctx.fillStyle=d.color;
ctx.beginPath();
ctx.roundRect(x+4,150-h,barW-8,h,[4,4,0,0]);
ctx.fill();
ctx.fillStyle=isDark?'#FFFFFF':'#2D3436';
ctx.font='bold 14px Nunito';ctx.textAlign='center';
ctx.fillText(d.label,x+barW/2,168);
if(d.value>0){ctx.font='bold 10px Nunito';ctx.fillText(d.value,x+barW/2,145-h);}
});
}
// Daily chart
let dailyCanvas=document.getElementById('dailyChart');
if(dailyCanvas){
let ctx=dailyCanvas.getContext('2d');
dailyCanvas.width=dailyCanvas.parentElement.offsetWidth;
dailyCanvas.height=180;
let isDark=state.theme==='night';
ctx.fillStyle=isDark?'#1A1A2E':'#FFFFFF';ctx.fillRect(0,0,dailyCanvas.width,dailyCanvas.height);
let today=new Date();
let data=[];
for(let i=6;i>=0;i--){
let d=new Date(today);d.setDate(d.getDate()-i);
let key=d.toISOString().split('T')[0];
data.push({label:['Pz','Pt','Sa','Ça','Pe','Cu','Ct'][d.getDay()],value:stats.dailyUsage[key]||0});
}
let maxVal=Math.max(...data.map(d=>d.value),1);
let barW=(dailyCanvas.width-40)/data.length;
data.forEach((d,i)=>{
let h=(d.value/maxVal)*130;
let x=20+i*barW;
let gradient=ctx.createLinearGradient(x,150-h,x,150);
gradient.addColorStop(0,'#4ECDC4');gradient.addColorStop(1,'#FF6B6B');
ctx.fillStyle=gradient;
ctx.beginPath();ctx.roundRect(x+6,150-h,barW-12,h,[6,6,0,0]);ctx.fill();
ctx.fillStyle=isDark?'#FFFFFF':'#2D3436';
ctx.font='bold 11px Nunito';ctx.textAlign='center';
ctx.fillText(d.label,x+barW/2,168);
if(d.value>0){ctx.font='bold 9px Nunito';ctx.fillText(formatTime(d.value),x+barW/2,143-h);}
});
}
// Hourly chart
let hourlyCanvas=document.getElementById('hourlyChart');
if(hourlyCanvas){
let ctx=hourlyCanvas.getContext('2d');
hourlyCanvas.width=hourlyCanvas.parentElement.offsetWidth;
hourlyCanvas.height=180;
let isDark=state.theme==='night';
ctx.fillStyle=isDark?'#1A1A2E':'#FFFFFF';ctx.fillRect(0,0,hourlyCanvas.width,hourlyCanvas.height);
let data=[];
for(let h=6;h<=22;h++){
data.push({label:h+'',value:stats.hourlyUsage[h]||0});
}
let maxVal=Math.max(...data.map(d=>d.value),1);
let barW=(hourlyCanvas.width-30)/data.length;
data.forEach((d,i)=>{
let h=(d.value/maxVal)*125;
let x=15+i*barW;
ctx.fillStyle=d.value>0?'#A29BFE':'#DFE6E9';
ctx.beginPath();ctx.roundRect(x+2,145-h,barW-4,h,[3,3,0,0]);ctx.fill();
ctx.fillStyle=isDark?'#B2BEC3':'#636E72';
ctx.font='bold 8px Nunito';ctx.textAlign='center';
ctx.fillText(d.label,x+barW/2,162);
});
}
}

// Canvas roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
if(!Array.isArray(r))r=[r,r,r,r];
this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath();
};
}

function setTheme(id){

}

function exportData(){
let data={stats,settings:{theme:state.theme,viewMode:state.viewMode},exportDate:new Date().toISOString()};
let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
let a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='mihra_ogr_'+new Date().toISOString().split('T')[0]+'.json';
a.click();showToast('Veriler dışa aktarıldı!');

// ===================== EVENTS =====================
function bindEvents(){
// Swipe for card view
let area=document.getElementById('app');
let startX=0,startY=0;
area.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
area.addEventListener('touchend',e=>{
if(state.screen!=='category'||state.viewMode!=='card')return;
let dx=e.changedTouches[0].clientX-startX;
let dy=e.changedTouches[0].clientY-startY;
if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
if(dx<0)cardNext();else cardPrev();
}
},{passive:true});
}

// ===================== TIMER =====================
function startSessionTimer(){
sessionTimer=setInterval(()=>{
let el=document.getElementById('sessionTimer');
if(el){
let elapsed=Math.floor((Date.now()-sessionStart)/1000);
let m=Math.floor(elapsed/60).toString().padStart(2,'0');
let s=(elapsed%60).toString().padStart(2,'0');
el.textContent=m+':'+s;
}
trackTime();
},1000);
}

// ===================== INIT =====================
function init(){
loadStats();
loadSettings();
// Apply zoom
if(state.zoom!==1){
document.getElementById('app-wrapper').style.transform='scale('+state.zoom+')';
}
render();
startSessionTimer();
// Record session
let now=new Date();
if(!stats.sessions)stats.sessions=[];
stats.sessions.push({date:now.toISOString(),startTime:now.toTimeString().substring(0,5)});
saveStats();
checkAchievements();

// Orientation change
window.addEventListener('resize',()=>{
// Re-render charts if on stats screen
if(state.screen==='stats')setTimeout(drawCharts,200);
});

// Fullscreen change
document.addEventListener('fullscreenchange',()=>{
let btn=document.getElementById('fsBtn');
if(btn)btn.textContent=document.fullscreenElement?'⛶':'⛶';
});

// Page visibility - pause timer
document.addEventListener('visibilitychange',()=>{
if(document.hidden){clearInterval(sessionTimer);}
else{startSessionTimer();}
});
}

// Start app
document.addEventListener('DOMContentLoaded',init);
// Backup init
if(document.readyState==='complete'||document.readyState==='interactive')setTimeout(init,1);
</script>
