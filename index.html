<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamiPDR - Premium Psikolojik Danışman Asistanı</title>
    
    <!-- Google Fonts: Plus Jakarta Sans (Premium Hissiyat İçin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome (İkonlar) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React ve ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS BÖLÜMÜ: Premium Kaydırma Çubuğu ve Animasyonlar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94A3B8; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Arka plan deseni */
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
        }

        .select-none { user-select: none; -webkit-user-select: none; -ms-user-select: none; }
        body { background-color: #F8FAFC; margin: 0; }
    </style>
</head>
<body class="bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- YARDIMCI FONKSİYONLAR ---
        const SECRET_KEY = "SAMIPDR_PREMIUM_KEY_2026";

        const encryptData = (data, key = SECRET_KEY) => {
            try {
                const textToChars = text => text.split('').map(c => c.charCodeAt(0));
                const byteHex = n => ("0" + Number(n).toString(16)).substr(-2);
                const applySaltToChar = code => textToChars(key).reduce((a,b) => a ^ b, code);
                return data.split('').map(textToChars).map(applySaltToChar).map(byteHex).join('');
            } catch (e) { return null; }
        };

        const decryptData = (encoded, key = SECRET_KEY) => {
            try {
                const textToChars = text => text.split('').map(c => c.charCodeAt(0));
                const applySaltToChar = code => textToChars(key).reduce((a,b) => a ^ b, code);
                return encoded.match(/.{1,2}/g).map(hex => parseInt(hex, 16)).map(applySaltToChar).map(charCode => String.fromCharCode(charCode)).join('');
            } catch (e) { return null; }
        };

        const formatTime = (date) => date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

        // --- ALT BİLEŞENLER (Yenilenme Sorununu Çözen Mimari Yapı) ---

        function Dashboard({ data, currentTime, nextBellInfo, setActiveTab }) {
            const activeReminders = (data.reminders || []).filter(r => !r.completed);
            const todayStr = new Date().toISOString().split('T')[0];
            const todayAppointments = (data.appointments || []).filter(a => a.date === todayStr);
            const highRiskStudents = (data.students || []).filter(s => s.risk === 'high');

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Premium Saat Kartı */}
                        <div className="lg:col-span-2 bg-gradient-to-br from-indigo-600 via-blue-600 to-sky-500 rounded-3xl p-6 md:p-8 text-white shadow-xl shadow-blue-500/20 relative overflow-hidden group">
                            <div className="absolute -right-20 -top-20 w-64 h-64 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-all duration-700"></div>
                            <div className="relative z-10 flex flex-col h-full justify-between">
                                <div>
                                    <h2 className="text-4xl md:text-5xl font-extrabold mb-2 tracking-tight tabular-nums">{currentTime.toLocaleTimeString('tr-TR')}</h2>
                                    <p className="text-blue-100/90 text-sm md:text-base font-medium">{currentTime.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                                
                                <div className="mt-8 bg-white/10 backdrop-blur-md rounded-2xl p-4 md:p-5 border border-white/20 flex items-center justify-between">
                                    <div>
                                        <p className="text-blue-100/80 text-xs font-bold mb-1 uppercase tracking-widest">{nextBellInfo.text}</p>
                                        <div className="text-3xl md:text-4xl font-black tabular-nums tracking-tighter">
                                            {String(nextBellInfo.minutes).padStart(2, '0')}<span className="text-blue-200/50 mx-1">:</span>{String(nextBellInfo.seconds).padStart(2, '0')}
                                        </div>
                                    </div>
                                    <div className={`w-12 h-12 md:w-16 md:h-16 rounded-2xl flex items-center justify-center text-xl md:text-2xl shadow-inner ${nextBellInfo.isBreak ? 'bg-emerald-400/30 text-emerald-100 border border-emerald-400/30' : 'bg-white/10 text-white border border-white/10'}`}>
                                        <i className="fa-regular fa-bell"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Hızlı İstatistikler */}
                        <div className="grid grid-cols-2 lg:grid-cols-1 gap-4">
                            <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-5 border border-slate-200/60 shadow-sm flex items-center hover:border-orange-200 transition-colors">
                                <div className="w-12 h-12 bg-orange-100/80 text-orange-600 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-sm">
                                    <i className="fa-solid fa-clipboard-check"></i>
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">Görevler</p>
                                    <p className="text-2xl font-black text-slate-800">{activeReminders.length}</p>
                                </div>
                            </div>
                            <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-5 border border-slate-200/60 shadow-sm flex items-center hover:border-violet-200 transition-colors">
                                <div className="w-12 h-12 bg-violet-100/80 text-violet-600 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-sm">
                                    <i className="fa-solid fa-users"></i>
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">Kayıtlı Öğr.</p>
                                    <p className="text-2xl font-black text-slate-800">{(data.students || []).length}</p>
                                </div>
                            </div>
                            <div className="col-span-2 lg:col-span-1 bg-white/80 backdrop-blur-xl rounded-3xl p-5 border border-slate-200/60 shadow-sm flex items-center hover:border-red-200 transition-colors">
                                <div className="w-12 h-12 bg-red-100/80 text-red-600 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-sm">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">Yüksek Risk</p>
                                    <p className="text-2xl font-black text-slate-800">{highRiskStudents.length}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Anımsatıcılar Özeti */}
                        <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-6 border border-slate-200/60 shadow-sm">
                            <div className="flex justify-between items-center mb-5">
                                <h3 className="text-base font-bold text-slate-800 flex items-center"><i className="fa-solid fa-list-check mr-2 text-blue-500"></i> Bekleyen Görevler</h3>
                                <button onClick={() => setActiveTab('reminders')} className="text-xs text-blue-600 font-bold hover:text-blue-800 transition-colors">Tümünü Gör</button>
                            </div>
                            {activeReminders.length === 0 ? (
                                <div className="py-8 text-center bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                                    <p className="text-slate-400 text-sm font-medium">Bekleyen görev bulunmuyor.</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {activeReminders.slice(0, 3).map(rem => (
                                        <div key={rem.id} className="flex items-start p-3 bg-white rounded-xl border border-slate-100 shadow-sm">
                                            <div className={`w-2.5 h-2.5 rounded-full mt-1.5 mr-3 flex-shrink-0 ${rem.priority === 'high' ? 'bg-red-500' : rem.priority === 'medium' ? 'bg-orange-400' : 'bg-blue-400'}`}></div>
                                            <div>
                                                <p className="text-slate-800 font-semibold text-sm">{rem.title}</p>
                                                <p className="text-[11px] text-slate-400 font-medium mt-0.5">{rem.date}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Bugünün Randevuları */}
                        <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-6 border border-slate-200/60 shadow-sm">
                            <div className="flex justify-between items-center mb-5">
                                <h3 className="text-base font-bold text-slate-800 flex items-center"><i className="fa-regular fa-calendar-check mr-2 text-indigo-500"></i> Bugünün Görüşmeleri</h3>
                                <button onClick={() => setActiveTab('appointments')} className="text-xs text-indigo-600 font-bold hover:text-indigo-800 transition-colors">Takvime Git</button>
                            </div>
                            {todayAppointments.length === 0 ? (
                                <div className="py-8 text-center bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                                    <p className="text-slate-400 text-sm font-medium">Bugün için randevu görünmüyor.</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {todayAppointments.map(app => (
                                        <div key={app.id} className="flex items-center p-3 bg-indigo-50/30 rounded-xl border border-indigo-100/50 shadow-sm">
                                            <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center font-bold text-sm mr-3 flex-shrink-0">
                                                {app.time}
                                            </div>
                                            <div>
                                                <p className="text-slate-800 font-bold text-sm">{app.studentName}</p>
                                                <p className="text-[11px] text-slate-500 font-medium mt-0.5">{app.topic}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function BellSchedule({ data, updateData }) {
            const [newBell, setNewBell] = useState({ name: '', start: '', end: '', type: 'lesson' });
            const bells = data.bells || [];

            const addBell = () => {
                if (!newBell.name || !newBell.start || !newBell.end) return;
                const updated = [...bells, { ...newBell, id: Date.now() }].sort((a, b) => a.start.localeCompare(b.start));
                updateData('bells', updated); 
                setNewBell({ name: '', start: '', end: '', type: 'lesson' });
            };
            const removeBell = (id) => updateData('bells', bells.filter(b => b.id !== id));

            return (
                <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-6 md:p-8 border border-slate-200/60 shadow-sm animate-fade-in pb-20">
                    <h2 className="text-2xl font-extrabold text-slate-800 mb-2">Ders Zili Programı</h2>
                    <p className="text-sm text-slate-500 font-medium mb-6">Zil saatlerini buradan ekleyebilir veya silebilirsiniz. (Değişiklikler anında kaydedilir)</p>

                    <div className="bg-slate-50/50 p-5 rounded-2xl border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-end shadow-inner">
                        <div className="flex-1 w-full">
                            <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Zil Adı</label>
                            <input type="text" value={newBell.name} onChange={e => setNewBell({...newBell, name: e.target.value})} placeholder="Örn: 1. Ders" className="w-full p-2.5 bg-white rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all font-medium" />
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                            <div className="w-1/2 md:w-28">
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Başlama</label>
                                <input type="time" value={newBell.start} onChange={e => setNewBell({...newBell, start: e.target.value})} className="w-full p-2.5 bg-white rounded-xl border border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700" />
                            </div>
                            <div className="w-1/2 md:w-28">
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Bitiş</label>
                                <input type="time" value={newBell.end} onChange={e => setNewBell({...newBell, end: e.target.value})} className="w-full p-2.5 bg-white rounded-xl border border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700" />
                            </div>
                        </div>
                        <div className="flex gap-4 mt-2 md:mt-0 w-full md:w-auto">
                            <div className="flex-1 md:w-36">
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Tür</label>
                                <select value={newBell.type} onChange={e => setNewBell({...newBell, type: e.target.value})} className="w-full p-2.5 bg-white rounded-xl border border-slate-200 focus:border-blue-500 outline-none font-medium text-slate-700 cursor-pointer">
                                    <option value="lesson">Ders</option>
                                    <option value="break">Teneffüs</option>
                                </select>
                            </div>
                            <button onClick={addBell} className="px-6 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold transition-colors flex items-center justify-center shadow-md">
                                Ekle
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {bells.map((bell, index) => (
                            <div key={bell.id} className={`flex items-center justify-between p-4 rounded-2xl border ${bell.type === 'break' ? 'bg-emerald-50/50 border-emerald-100' : 'bg-white border-slate-100'} shadow-sm hover:shadow-md transition-shadow`}>
                                <div className="flex items-center">
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center mr-4 font-black text-lg ${bell.type === 'break' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-50 text-blue-600'}`}>
                                        {index + 1}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 text-base">{bell.name}</h4>
                                        <p className="text-xs text-slate-500 font-semibold flex items-center mt-0.5"><i className="fa-regular fa-clock mr-1"></i> {bell.start} - {bell.end}</p>
                                    </div>
                                </div>
                                <button onClick={() => removeBell(bell.id)} className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                                    <i className="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        ))}
                    </div>
                    {bells.length === 0 && <div className="text-center py-16"><i className="fa-regular fa-bell-slash text-5xl text-slate-300 mb-3"></i><p className="text-slate-500 font-medium">Henüz zil programı oluşturulmadı.</p></div>}
                </div>
            );
        }

        function Students({ data, updateData }) {
            const students = data.students || [];
            const [newStudent, setNewStudent] = useState({ firstName: '', lastName: '', grade: '', parentPhone: '', risk: 'low' });
            const [search, setSearch] = useState('');

            const addStudent = (e) => {
                e.preventDefault();
                if (!newStudent.firstName || !newStudent.lastName) return;
                const updated = [{ ...newStudent, id: Date.now() }, ...students];
                updateData('students', updated);
                setNewStudent({ firstName: '', lastName: '', grade: '', parentPhone: '', risk: 'low' });
            };

            const deleteStudent = (id) => {
                if(window.confirm('Öğrenci kaydını silmek istediğinize emin misiniz?')) {
                    updateData('students', students.filter(s => s.id !== id));
                }
            };

            const filtered = students.filter(s => 
                `${s.firstName} ${s.lastName} ${s.grade}`.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="bg-white/80 backdrop-blur-xl rounded-3xl border border-slate-200/60 shadow-sm animate-fade-in flex flex-col md:flex-row h-[calc(100vh-140px)] overflow-hidden">
                    {/* Ekleme Formu */}
                    <div className="w-full md:w-1/3 bg-slate-50/50 border-b md:border-r border-slate-200/60 p-6 flex flex-col overflow-y-auto custom-scrollbar">
                        <h2 className="text-xl font-extrabold text-slate-800 mb-6 flex items-center"><i className="fa-solid fa-user-plus mr-2 text-indigo-500"></i> Yeni Öğrenci</h2>
                        <form onSubmit={addStudent} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Adı</label>
                                <input type="text" value={newStudent.firstName} onChange={e => setNewStudent({...newStudent, firstName: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-medium outline-none focus:border-indigo-500" required />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Soyadı</label>
                                <input type="text" value={newStudent.lastName} onChange={e => setNewStudent({...newStudent, lastName: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-medium outline-none focus:border-indigo-500" required />
                            </div>
                            <div className="flex gap-3">
                                <div className="w-1/2">
                                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Sınıf/Şube</label>
                                    <input type="text" value={newStudent.grade} onChange={e => setNewStudent({...newStudent, grade: e.target.value})} placeholder="Örn: 9/A" className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-medium outline-none focus:border-indigo-500" />
                                </div>
                                <div className="w-1/2">
                                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Risk Grubu</label>
                                    <select value={newStudent.risk} onChange={e => setNewStudent({...newStudent, risk: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold outline-none focus:border-indigo-500">
                                        <option value="low" className="text-slate-700">Düşük</option>
                                        <option value="medium" className="text-orange-600">Orta</option>
                                        <option value="high" className="text-red-600">Yüksek</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Veli Telefonu</label>
                                <input type="tel" value={newStudent.parentPhone} onChange={e => setNewStudent({...newStudent, parentPhone: e.target.value})} className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-medium outline-none focus:border-indigo-500" />
                            </div>
                            <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-md transition-colors mt-2">
                                Kaydet
                            </button>
                        </form>
                    </div>

                    {/* Öğrenci Listesi */}
                    <div className="flex-1 bg-white p-6 flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-extrabold text-slate-800">Öğrenci Veritabanı <span className="text-sm font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md ml-2">{students.length} Kayıt</span></h2>
                            <div className="relative w-48 md:w-64">
                                <i className="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                <input type="text" placeholder="İsim veya sınıf ara..." value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium outline-none focus:border-indigo-500" />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                            {filtered.map(s => (
                                <div key={s.id} className="flex flex-col md:flex-row md:items-center justify-between p-4 rounded-2xl border border-slate-100 bg-slate-50/30 hover:bg-slate-50 hover:border-slate-200 transition-colors group">
                                    <div className="flex items-center mb-3 md:mb-0">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg mr-4 flex-shrink-0 ${s.risk === 'high' ? 'bg-red-100 text-red-600' : s.risk === 'medium' ? 'bg-orange-100 text-orange-600' : 'bg-slate-200 text-slate-600'}`}>
                                            {s.firstName[0]}{s.lastName[0]}
                                        </div>
                                        <div>
                                            <h4 className="font-extrabold text-slate-800 text-base">{s.firstName} {s.lastName}</h4>
                                            <div className="flex gap-3 mt-1 text-xs font-semibold text-slate-500">
                                                {s.grade && <span><i className="fa-solid fa-chalkboard-user mr-1"></i>{s.grade}</span>}
                                                {s.parentPhone && <span><i className="fa-solid fa-phone mr-1"></i>{s.parentPhone}</span>}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between md:justify-end gap-4">
                                        <span className={`px-3 py-1 text-xs font-bold rounded-full ${s.risk === 'high' ? 'bg-red-100 text-red-600' : s.risk === 'medium' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-500'}`}>
                                            {s.risk === 'high' ? 'Yüksek Risk' : s.risk === 'medium' ? 'Orta Risk' : 'Düşük Risk'}
                                        </span>
                                        <button onClick={() => deleteStudent(s.id)} className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                                            <i className="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {filtered.length === 0 && (
                                <div className="text-center py-20">

        function SettingsPanel({ data, updateData }) {
            const [schoolName, setSchoolName] = useState(data.schoolName || "");
            const [pwd, setPwd] = useState(data.password || '');
            
            const handleSaveSettings = () => {
                updateData('schoolName', schoolName); updateData('password', pwd || null); alert("Ayarlar başarıyla kaydedildi.");
            };
            const handleExport = () => {
                const encrypted = encryptData(JSON.stringify(data));
                if(!encrypted) return alert("Şifreleme hatası oluştu.");
                const blob = new Blob([encrypted], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `SamiPDR_Yedek_${new Date().toLocaleDateString('tr-TR').replace(/\./g, '-')}.pdr`;
                link.href = url; link.click();
            };
            const handleImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const decryptedStr = decryptData(event.target.result);
                    if (decryptedStr) {
                        try {
                            const parsed = JSON.parse(decryptedStr);
                            if(window.confirm("Yedek verileriniz mevcut verilerin üzerine yazılacak. Onaylıyor musunuz?")) { 
                                // Direct localStorage update and page reload to cleanly mount new data
                                localStorage.setItem('samipdr_data', JSON.stringify(parsed));
                                alert("Veriler başarıyla yüklendi! Sayfa yenileniyor...");
                                window.location.reload();
                            }
                        } catch (err) { alert("Bozuk veya geçersiz dosya formatı."); }
                    } else { alert("Dosya şifresi çözülemedi. Geçersiz dosya."); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-6 md:p-10 border border-slate-200/60 shadow-sm animate-fade-in max-w-5xl mx-auto">
                    <h2 className="text-2xl font-extrabold text-slate-800 mb-8">Sistem Ayarları</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-6">
                            <div className="bg-slate-50/80 p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="text-lg font-extrabold text-slate-800 mb-4 flex items-center"><i className="fa-solid fa-school mr-3 text-blue-500 bg-blue-100 p-2 rounded-lg"></i> Kurum Bilgileri</h3>
                                <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Okul / Kurum Adı</label>
                                <input type="text" value={schoolName} onChange={e => setSchoolName(e.target.value)} className="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-base font-bold outline-none focus:border-blue-500 shadow-sm" />
                            </div>
                            
                            <div className="bg-slate-50/80 p-6 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden">
                                <h3 className="text-lg font-extrabold text-slate-800 mb-2 flex items-center"><i className="fa-solid fa-shield-halved mr-3 text-emerald-500 bg-emerald-100 p-2 rounded-lg"></i> Güvenlik Şifresi</h3>
                                <p className="text-xs text-slate-500 mb-4 font-medium leading-relaxed">Uygulama açılışına şifre koymak istiyorsanız aşağıya giriniz. Şifre istemiyorsanız alanı tamamen boş bırakıp kaydedin.</p>
                                <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} placeholder="Yeni şifre belirleyin" className="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-base font-bold outline-none focus:border-emerald-500 shadow-sm relative z-10" />
                            </div>
                            
                            <button onClick={handleSaveSettings} className="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-extrabold text-lg shadow-xl shadow-slate-800/20 transition-all active:scale-95">
                                Ayarları Kaydet
                            </button>
                        </div>

                        <div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-3xl border border-indigo-100 shadow-sm flex flex-col relative overflow-hidden">
                            <i className="fa-solid fa-database absolute -right-10 -bottom-10 text-9xl text-indigo-500/10"></i>
                            <h3 className="text-lg font-extrabold text-slate-800 mb-2 flex items-center relative z-10"><i className="fa-solid fa-cloud-arrow-down mr-3 text-indigo-600 bg-indigo-100 p-2 rounded-lg"></i> Veri Yedekleme (Şifreli)</h3>
                            <p className="text-sm text-slate-600 mb-8 font-medium leading-relaxed relative z-10">Tüm verileriniz sadece bu tarayıcının hafızasında tutulur. Format atma veya tarayıcı sıfırlama durumlarına karşı düzenli aralıklarla yedeğinizi bilgisayarınıza indirip güvenli bir klasörde saklayın.</p>
                            
                            <div className="space-y-4 mt-auto relative z-10">
                                <button onClick={handleExport} className="w-full flex items-center justify-center p-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-extrabold transition-colors shadow-lg shadow-indigo-600/20">
                                    <i className="fa-solid fa-download mr-3 text-xl"></i> Yedeği İndir (.pdr)
                                </button>
                                
                                <div className="relative w-full">
                                    <input type="file" accept=".pdr" onChange={handleImport} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                    <button className="w-full flex items-center justify-center p-4 bg-white border-2 border-indigo-200 text-indigo-700 hover:bg-indigo-50 rounded-2xl font-extrabold transition-colors">
                                        <i className="fa-solid fa-upload mr-3 text-xl"></i> Yedekten Geri Yükle
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ANA UYGULAMA BİLEŞENİ (APP) ---
        function App() {
            // Standart Veri Çerçevesi
            const defaultData = {
                schoolName: "Okul Adı Giriniz", password: null,
                bells: [
                    { id: 1, name: "1. Ders", start: "08:30", end: "09:10", type: "lesson" },
                    { id: 2, name: "Teneffüs", start: "09:10", end: "09:25", type: "break" }
                ],
                reminders: [], notes: [], students: [], appointments: [], theme: 'light'
            };

            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('samipdr_data');
                if (saved) {
                    try { return {...defaultData, ...JSON.parse(saved)}; } catch (e) { return defaultData; }
                }
                return defaultData;
            });

            const [isAuthenticated, setIsAuthenticated] = useState(!data.password);
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [nextBellInfo, setNextBellInfo] = useState({ text: "Zil Bekleniyor", minutes: 0, seconds: 0 });
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Veri Kaydetme
            useEffect(() => { localStorage.setItem('samipdr_data', JSON.stringify(data)); }, [data]);

            // Korumalar
            useEffect(() => {
                const handleContextMenu = (e) => e.preventDefault();
                const handleKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'u', 'p', 's'].includes(e.key.toLowerCase())) e.preventDefault();
                    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
                };
                document.addEventListener('contextmenu', handleContextMenu);
                document.addEventListener('keydown', handleKeyDown);
                document.body.classList.add('select-none');
                return () => {
                    document.removeEventListener('contextmenu', handleContextMenu);
                    document.removeEventListener('keydown', handleKeyDown);
                    document.body.classList.remove('select-none');
                };
            }, []);

            // Titreme sorununu çözmek için ayrıştırılmış Zil Hesaplama Mantığı
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    
                    const bells = data.bells || [];
                    if (bells.length > 0) {
                        const currentMinutes = now.getHours() * 60 + now.getMinutes();
                        const currentSeconds = now.getSeconds();
                        
                        const sortedBells = [...bells].sort((a, b) => {
                            const aMins = parseInt(a.start.split(':')[0]) * 60 + parseInt(a.start.split(':')[1]);
                            const bMins = parseInt(b.start.split(':')[0]) * 60 + parseInt(b.start.split(':')[1]);
                            return aMins - bMins;
                        });

                        let found = false;
                        for (let i = 0; i < sortedBells.length; i++) {
                            const bell = sortedBells[i];
                            const startMins = parseInt(bell.start.split(':')[0]) * 60 + parseInt(bell.start.split(':')[1]);
                            const endMins = parseInt(bell.end.split(':')[0]) * 60 + parseInt(bell.end.split(':')[1]);

                            if (currentMinutes >= startMins && currentMinutes < endMins) {
                                setNextBellInfo({
                                    text: `${bell.name} BİTİMİNE:`,
                                    minutes: endMins - currentMinutes - 1,
                                    seconds: 60 - currentSeconds === 60 ? 0 : 60 - currentSeconds,
                                    isBreak: bell.type === 'break'
                                });
                                found = true; break;
                            }
                            if (currentMinutes < startMins) {
                                setNextBellInfo({
                                    text: `${bell.name} BAŞLAMASINA:`,
                                    minutes: startMins - currentMinutes - 1,
                                    seconds: 60 - currentSeconds === 60 ? 0 : 60 - currentSeconds,
                                    isBreak: false
                                });
                                found = true; break;
                            }
                        }
                        if (!found) setNextBellInfo({ text: "MESAİ DIŞI", minutes: 0, seconds: 0 });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [data.bells]);

            const updateData = (key, value) => setData(prev => ({ ...prev, [key]: value }));

            // --- GİRİŞ EKRANI ---
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-mesh">
                        <div className="max-w-md w-full bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl p-8 md:p-10 border border-white/50 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-sky-500"></div>
                            <div className="text-center mb-8">
                                <div className="w-24 h-24 bg-gradient-to-br from-slate-100 to-slate-200 text-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner text-4xl transform rotate-3">
                                    <i className="fa-solid fa-shield-halved -rotate-3"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">Sami<span className="text-indigo-600">PDR</span></h1>
                                <p className="text-slate-500 mt-2 font-medium">Sisteme erişmek için kasanızı açın.</p>
                            </div>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                if (loginPassword === data.password) { setIsAuthenticated(true); setLoginError(''); } 
                                else setLoginError('Hatalı şifre. Lütfen tekrar deneyin.');
                            }} className="space-y-6">
                                <div>
                                    <div className="relative">
                                        <i className="fa-solid fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                        <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-slate-50/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none font-bold text-lg transition-all" placeholder="Güvenlik Şifresi" autoFocus />
                                    </div>
                                    {loginError && <p className="text-red-500 text-sm mt-3 font-bold flex items-center justify-center bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-circle-exclamation mr-2"></i> {loginError}</p>}
                                </div>
                                <button type="submit" className="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-extrabold text-lg shadow-xl shadow-slate-900/20 transition-all active:scale-95">
                                    Kilidi Aç
                                </button>
                            </form>
                            <div className="mt-12 text-center opacity-60">
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Geliştirici</p>
                                <p className="text-sm font-extrabold text-slate-800">Sami GÜREVİN</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- MENÜ VE ANA ÇERÇEVE ---
            const menuItems = [
                { id: 'dashboard', icon: 'fa-table-cells-large', label: 'Ana Ekran' },
                { id: 'appointments', icon: 'fa-calendar-check', label: 'Randevu Takvimi' },
                { id: 'students', icon: 'fa-users-viewfinder', label: 'Öğrenciler' },
                { id: 'bells', icon: 'fa-bell', label: 'Zil Saatleri' },
                { id: 'notes', icon: 'fa-lock', label: 'Güvenli Notlar' },
                { id: 'reminders', icon: 'fa-list-check', label: 'Görevler' },
                { id: 'settings', icon: 'fa-gear', label: 'Ayarlar' },
            ];

            return (
                <div className="min-h-screen flex text-slate-800 selection:bg-indigo-100 selection:text-indigo-900 overflow-hidden">
                    {/* Mobil Arkaplan */}
                    {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    {/* YAN MENÜ */}
                    <div className={`fixed inset-y-0 left-0 w-[280px] bg-white/70 backdrop-blur-3xl border-r border-slate-200/50 shadow-2xl md:shadow-none flex flex-col z-50 transform transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0`}>
                        <div className="p-6 md:p-8 flex items-center justify-between">
                            <div className="flex items-center">
                                <div className="flex items-center justify-center w-12 h-12 bg-slate-800 text-white rounded-2xl shadow-lg mr-3 text-xl">
                                    <i className="fa-solid fa-layer-group"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Sami<span className="text-indigo-600">PDR</span></h1>
                                    <p className="text-[10px] font-bold text-slate-500 mt-1 uppercase truncate max-w-[140px] tracking-widest">{data.schoolName}</p>
                                </div>
                            </div>
                            <button className="md:hidden w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-500" onClick={() => setIsMobileMenuOpen(false)}>
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">
                            <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest pl-4 mb-3 mt-2">Modüller</p>
                            {menuItems.map((item) => {
                                const active = activeTab === item.id;
                                return (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center px-4 py-3.5 rounded-2xl transition-all font-bold text-sm ${active ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/20' : 'text-slate-500 hover:bg-slate-100/80 hover:text-slate-800'}`}>
                                        <i className={`fa-solid ${item.icon} w-6 text-left ${active ? 'text-indigo-200' : 'text-slate-400'}`}></i>
                                        {item.label}
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-6 m-4 mt-2 bg-gradient-to-br from-slate-100 to-slate-50 rounded-3xl border border-slate-200/60 relative overflow-hidden">
                            <div className="absolute -right-4 -bottom-4 text-6xl text-slate-200 opacity-50"><i className="fa-solid fa-code"></i></div>
                            <div className="relative z-10">
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Geliştirici</p>
                                <p className="text-sm font-black text-slate-800">Sami GÜREVİN</p>
                                <p className="text-[10px] font-bold text-indigo-600">Psik. Danışman</p>
                                {data.password && (
                                    <button onClick={() => setIsAuthenticated(false)} className="mt-4 w-full flex items-center justify-center p-2.5 bg-white border border-slate-200 text-xs text-slate-600 hover:border-slate-300 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                        <i className="fa-solid fa-lock mr-2 text-slate-400"></i> Sistemi Kilitle
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* ANA SAHNE */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden w-full relative">
                        {/* Arka plan dekorasyonları */}
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-100/40 rounded-full blur-[100px] pointer-events-none -z-10"></div>
                        <div className="absolute bottom-0 left-0 w-[300px] h-[300px] bg-blue-100/40 rounded-full blur-[80px] pointer-events-none -z-10"></div>

                        <header className="h-20 px-6 md:px-10 flex items-center justify-between z-30">
                            <div className="flex items-center">
                                <button className="md:hidden mr-4 w-10 h-10 bg-white border border-slate-200 shadow-sm rounded-xl flex items-center justify-center text-slate-600" onClick={() => setIsMobileMenuOpen(true)}>
                                    <i className="fa-solid fa-bars-staggered"></i>
                                </button>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 capitalize tracking-tight">
                                    {menuItems.find(m => m.id === activeTab)?.label}
                                </h2>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-white/60 backdrop-blur-md border border-slate-200/60 px-4 py-2.5 rounded-2xl flex items-center text-sm font-bold text-slate-700 shadow-sm w-24 justify-center">
                                    <span className="tabular-nums font-mono tracking-tighter text-[15px]">{formatTime(currentTime)}</span>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto px-4 md:px-10 pb-10 custom-scrollbar z-10">
                            <div className="max-w-7xl mx-auto h-full pt-2">
                                {/* Alt bileşenler dışarıda tanımlandığı için React DOM'u tekrar mount etmez! Animasyonlar sadece sekme geçişinde çalışır. */}
                                {activeTab === 'dashboard' && <Dashboard data={data} currentTime={currentTime} nextBellInfo={nextBellInfo} setActiveTab={setActiveTab} />}
                                {activeTab === 'appointments' && <Appointments data={data} updateData={updateData} />}
                                {activeTab === 'students' && <Students data={data} updateData={updateData} />}
                                {activeTab === 'bells' && <BellSchedule data={data} updateData={updateData} />}
                                {activeTab === 'notes' && <SessionNotes data={data} updateData={updateData} />}
                                {activeTab === 'reminders' && <Reminders data={data} updateData={updateData} />}
                                {activeTab === 'settings' && <SettingsPanel data={data} updateData={updateData} />}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
